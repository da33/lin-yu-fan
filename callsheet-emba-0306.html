<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBA 拍攝通告 - 2026/03/06</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header .date {
            font-size: 18px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #2a5298;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .info-grid {
            display: grid;
            gap: 15px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .info-label {
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }
        .info-value {
            color: #212529;
            font-size: 16px;
        }
        .crew-list {
            list-style: none;
        }
        .crew-list li {
            background: #f8f9fa;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
        }
        .highlight {
            background: #fff3cd;
            border-left-color: #ffc107;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .header h1 {
                font-size: 24px;
            }
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 EMBA 形象影片拍攝通告</h1>
            <div class="date">2026 年 3 月 6 日（四）</div>
        </div>
        
        <div class="content">
            <div class="section">
                <div class="section-title">📍 拍攝資訊</div>
                <div class="info-grid">
                    <div class="info-item highlight">
                        <div class="info-label">拍攝時間</div>
                        <div class="info-value">2026/03/06（四）上午 10:00</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">拍攝地點</div>
                        <div class="info-value">商設系 7 樓</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">受訪者</div>
                        <div class="info-value">莊暢 校長</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">影片主題</div>
                        <div class="info-value">EMBA 形象影片（旅程敘事）</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">👥 劇組人員</div>
                <ul class="crew-list">
                    <li><strong>導演：</strong>林祐凡 Rino</li>
                    <li><strong>攝影：</strong>Suki / 林璐</li>
                    <li><strong>攝影助理：</strong>待確認</li>
                    <li><strong>導演助理兼化妝師：</strong>宸瑄</li>
                    <li><strong>髮型師：</strong>林璐</li>
                </ul>
            </div>

            <div class="section">
                <div class="section-title">📝 備註</div>
                <div class="info-item">
                    <div class="info-value">
                        • 原班人馬出動<br>
                        • 請提前 15 分鐘到場準備<br>
                        • 確認妝髮及燈光設備
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
