<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMBA 拍攝通告 - 2026/03/06</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .header .date {
            font-size: 16px;
            color: #888;
            font-weight: 400;
        }
        .section {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            font-size: 14px;
            color: #888;
        }
        .info-value {
            font-size: 16px;
            font-weight: 500;
            text-align: right;
        }
        .highlight {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border: 1px solid #333;
        }
        .crew-list {
            list-style: none;
        }
        .crew-list li {
            padding: 10px 0;
            font-size: 15px;
            border-bottom: 1px solid #1a1a1a;
        }
        .crew-list li:last-child {
            border-bottom: none;
        }
        .crew-list strong {
            color: #aaa;
            font-weight: 500;
            display: inline-block;
            min-width: 100px;
        }
        .notes {
            font-size: 14px;
            line-height: 1.8;
            color: #aaa;
        }
        @media (max-width: 600px) {
            body {
                padding: 16px;
            }
            .header h1 {
                font-size: 28px;
            }
            .section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 EMBA 拍攝通告</h1>
            <div class="date">2026 年 3 月 6 日 星期四</div>
        </div>
        
        <div class="section highlight">
            <div class="info-row">
                <div class="info-label">時間</div>
                <div class="info-value">10:00 AM</div>
            </div>
            <div class="info-row">
                <div class="info-label">地點</div>
                <div class="info-value">商設系 7 樓</div>
            </div>
            <div class="info-row">
                <div class="info-label">受訪者</div>
                <div class="info-value">莊暢 校長</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">劇組人員</div>
            <ul class="crew-list">
                <li><strong>導演</strong>林祐凡 Rino</li>
                <li><strong>攝影</strong>Suki</li>
                <li><strong>攝影助理</strong>林璐</li>
                <li><strong>導演助理</strong>宸瑄</li>
                <li><strong>化妝師</strong>宸瑄</li>
                <li><strong>髮型師</strong>林璐</li>
            </ul>
        </div>

        <div class="section">
            <div class="section-title">備註</div>
            <div class="notes">
                • 原班人馬出動<br>
                • 請提前 15 分鐘到場準備<br>
                • 確認妝髮及燈光設備
            </div>
        </div>
    </div>
</body>
</html>
