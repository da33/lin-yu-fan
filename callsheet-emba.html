<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#0a0a0a;font-family:'Noto Sans TC','Arial',sans-serif;color:#f5f3ee;position:relative;overflow:hidden}
.top-bar{position:absolute;top:0;left:0;right:0;height:6px;background:#f5f3ee}
.bot-bar{position:absolute;bottom:0;left:0;right:0;height:6px;background:#f5f3ee}
.left-line{position:absolute;left:60px;top:80px;bottom:80px;width:3px;background:#222}
.inner{padding:90px 90px 90px 90px}
.label{font-size:22px;letter-spacing:.4em;text-transform:uppercase;color:#666;margin-bottom:8px}
.title{font-size:80px;font-weight:900;letter-spacing:-.02em;line-height:1;margin-bottom:30px}
.divider{height:1px;background:#222;margin:20px 0}
.project{font-size:26px;color:#888;margin-bottom:12px}
.subtitle{font-size:48px;font-weight:700;margin-bottom:30px}
.info-block{margin-bottom:0}
.info-row{padding:18px 0;border-bottom:1px solid #1a1a1a}
.info-label{font-size:20px;color:#666;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
.info-value{font-size:34px;font-weight:500}
.crew-section{margin-top:30px}
.crew-title{font-size:20px;letter-spacing:.3em;text-transform:uppercase;color:#666;margin-bottom:20px}
.crew-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #111}
.crew-role{font-size:20px;color:#666}
.crew-name{font-size:24px;font-weight:500}
.footer{position:absolute;bottom:20px;left:90px;right:90px;font-size:20px;color:#444;letter-spacing:.1em}
.accent{color:#c9a84c}
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="bot-bar"></div>
<div class="left-line"></div>
<div class="inner">
  <div class="label">Call Sheet · 拍攝通告</div>
  <div class="title">CALL<br>SHEET</div>
  <div class="divider"></div>
  <div class="project">萬能科技大學 · 系所特色影片計劃</div>
  <div class="subtitle">EMBA 校友專訪</div>
  <div class="info-block">
    <div class="info-row"><div class="info-label">受訪者</div><div class="info-value">劉世煌 總經理</div></div>
    <div class="info-row"><div class="info-label">身份</div><div class="info-value">EMBA 校友</div></div>
    <div class="info-row"><div class="info-label">日期</div><div class="info-value accent">2026 / 02 / 26（四）</div></div>
    <div class="info-row"><div class="info-label">集合時間</div><div class="info-value accent">10:30</div></div>
    <div class="info-row"><div class="info-label">地點</div><div class="info-value">管理大樓 G106</div></div>
    <div class="info-row"><div class="info-label">備註</div><div class="info-value">先妝髮後拍攝</div></div>
  </div>
  <div class="crew-section">
    <div class="crew-title">Crew · 劇組人員</div>
    <div class="crew-row"><span class="crew-role">導演 Director</span><span class="crew-name">Rino 林祐凡</span></div>
    <div class="crew-row"><span class="crew-role">攝影 DOP</span><span class="crew-name">Suki · 林璐</span></div>
    <div class="crew-row"><span class="crew-role">導演助理 / 化妝</span><span class="crew-name">宸瑄</span></div>
    <div class="crew-row"><span class="crew-role">髮型師</span><span class="crew-name">林璐</span></div>
  </div>
</div>
<div class="footer">萬能科技大學 招生處多媒體行銷 · 林祐凡 Rino</div>
</body>
</html>
