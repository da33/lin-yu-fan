<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冬瓜 Hair Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, 50px); }
        }
        
        .hero-content {
            text-align: center;
            z-index: 1;
        }
        
        .hero h1 {
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 20px;
            color: #888;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        
        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: #888;
        }
        
        .gallery {
            padding: 100px 60px;
            background: #0a0a0a;
        }
        
        .section-title {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 80px;
            letter-spacing: -1px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .gallery-item {
            aspect-ratio: 3/4;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .contact {
            padding: 100px 60px;
            background: #000;
            text-align: center;
        }
        
        .contact-info {
            max-width: 600px;
            margin: 0 auto;
            margin-top: 60px;
        }
        
        .contact-item {
            margin-bottom: 30px;
            font-size: 18px;
            color: #888;
        }
        
        .contact-item strong {
            color: #fff;
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        @media (max-width: 768px) {
            nav {
                padding: 20px 30px;
            }
            
            .nav-links {
                gap: 20px;
            }
            
            .hero h1 {
                font-size: 48px;
            }
            
            .hero p {
                font-size: 14px;
            }
            
            .gallery, .contact {
                padding: 60px 30px;
            }
            
            .section-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">冬瓜</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#gallery">Works</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1>冬瓜</h1>
            <p>Hair Design Studio</p>
        </div>
    </section>

    <section class="gallery" id="gallery">
        <h2 class="section-title">作品集</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600" alt="Hair Design 1">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=600" alt="Hair Design 2">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?w=600" alt="Hair Design 3">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1519699047748-de8e457a634e?w=600" alt="Hair Design 4">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=600" alt="Hair Design 5">
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1605497788044-5a32c7078486?w=600" alt="Hair Design 6">
            </div>
        </div>
    </section>

    <section class="contact" id="contact">
        <h2 class="section-title">聯絡方式</h2>
        <div class="contact-info">
            <div class="contact-item">
                <strong>Instagram</strong>
                @donggua_hair
            </div>
            <div class="contact-item">
                <strong>電話</strong>
                0912-345-678
            </div>
            <div class="contact-item">
                <strong>地址</strong>
                台北市信義區○○路○○號
            </div>
        </div>
    </section>
</body>
</html>
