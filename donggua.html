<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冬瓜 Hair Design</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Helvetica Neue', -apple-system, sans-serif;
            background: #0d0d0d;
            color: #fff;
            overflow-x: hidden;
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            mix-blend-mode: difference;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            color: #fff;
        }
        
        .nav-links {
            display: flex;
            gap: 60px;
            list-style: none;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 3px;
            position: relative;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: #fff;
            transition: width 0.3s;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #0d0d0d;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.02) 0%, transparent 50%);
        }
        
        .hero-content {
            text-align: center;
            z-index: 1;
        }
        
        .hero h1 {
            font-size: 120px;
            font-weight: 200;
            letter-spacing: 20px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 1.2s ease forwards;
        }
        
        .hero p {
            font-size: 14px;
            font-weight: 300;
            color: #999;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1.2s ease 0.3s forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(30px);
            }
        }
        
        .gallery {
            padding: 150px 80px;
            background: #0d0d0d;
        }
        
        .section-title {
            font-size: 60px;
            font-weight: 200;
            text-align: center;
            margin-bottom: 100px;
            letter-spacing: 10px;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #0d0d0d;
        }
        
        .gallery-item {
            aspect-ratio: 3/4;
            overflow: hidden;
            position: relative;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: all 0.6s ease;
        }
        
        .gallery-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }
        
        .contact {
            padding: 150px 80px;
            background: #000;
            text-align: center;
        }
        
        .contact-info {
            max-width: 500px;
            margin: 80px auto 0;
        }
        
        .contact-item {
            margin-bottom: 50px;
            font-size: 16px;
            font-weight: 300;
            color: #666;
            letter-spacing: 2px;
        }
        
        .contact-item strong {
            color: #fff;
            display: block;
            margin-bottom: 15px;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        @media (max-width: 768px) {
            nav { padding: 30px 40px; }
            .logo { font-size: 20px; letter-spacing: 4px; }
            .nav-links { gap: 30px; }
            .nav-links a { font-size: 11px; }
            .hero h1 { font-size: 60px; letter-spacing: 10px; }
            .hero p { font-size: 11px; }
            .gallery { padding: 80px 20px; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .section-title { font-size: 36px; }
            .contact { padding: 80px 40px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">冬瓜</div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#gallery">WORKS</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1>冬瓜</h1>
            <p>Hair Design Studio</p>
        </div>
    </section>

    <section class="gallery" id="gallery">
        <h2 class="section-title">作品集</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=800" alt="Hair Design 1"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?w=800" alt="Hair Design 2"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?w=800" alt="Hair Design 3"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1519699047748-de8e457a634e?w=800" alt="Hair Design 4"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?w=800" alt="Hair Design 5"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1605497788044-5a32c7078486?w=800" alt="Hair Design 6"></div>
        </div>
    </section>

    <section class="contact" id="contact">
        <h2 class="section-title">聯絡方式</h2>
        <div class="contact-info">
            <div class="contact-item"><strong>Instagram</strong>@w_2005_01_26</div>
            <div class="contact-item"><strong>Phone</strong>0912-345-678</div>
            <div class="contact-item"><strong>Location</strong>台北市信義區</div>
        </div>
    </section>
</body>
</html>
