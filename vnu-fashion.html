<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNU 時尚造型設計暨表演藝術系</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }
        
        /* 導航 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(250,250,250,0.95);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .social {
            display: flex;
            gap: 15px;
        }
        
        .social a {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        
        .social a:hover {
            transform: translateY(-3px);
        }
        
        /* Hero - 幾何圖形背景 */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: #1a1a1a;
            transform: rotate(45deg);
            top: -300px;
            right: -300px;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid #1a1a1a;
            transform: rotate(30deg);
            bottom: -200px;
            left: -200px;
        }
        
        .hero-content {
            text-align: center;
            z-index: 1;
            max-width: 800px;
            padding: 0 40px;
        }
        
        .hero h1 {
            font-size: 64px;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }
        
        .hero p {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
        }
        
        /* 特色區塊 - 幾何卡片 */
        .features {
            padding: 100px 50px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 60px;
        }
        
        .feature-card {
            background: #fff;
            padding: 50px 30px;
            position: relative;
            transition: transform 0.3s;
        }
        
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            clip-path: polygon(0 0, 100% 0, 0 100%);
        }
        
        .feature-card:hover {
            transform: translateY(-10px);
        }
        
        .feature-card h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .feature-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }
        
        .section-title {
            font-size: 36px;
            font-weight: 300;
            text-align: center;
        }
        
        /* Gallery - 簡約網格 */
        .gallery {
            padding: 100px 50px;
            background: #fff;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 60px auto 0;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
        }
        
        .gallery-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #1a1a1a;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }
        
        .gallery-item:hover::before {
            opacity: 0.1;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* CTA */
        .cta {
            padding: 100px 50px;
            text-align: center;
            position: relative;
        }
        
        .cta::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid #e0e0e0;
            transform: rotate(45deg);
            top: 50%;
            left: 50%;
            margin: -150px 0 0 -150px;
            z-index: 0;
        }
        
        .cta-content {
            position: relative;
            z-index: 1;
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            background: #1a1a1a;
            color: #fff;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #000;
            transform: translateY(-3px);
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 40px; }
            .features-grid, .gallery-grid { grid-template-columns: 1fr; }
            .cta-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VNU FASHION</div>
        <div class="social">
            <a href="https://www.instagram.com/vnu001_official" target="_blank">IG</a>
            <a href="https://youtube.com/@henryproduction" target="_blank">YT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>時尚造型設計<br>暨表演藝術系</h1>
            <p>Fashion & Performing Arts</p>
        </div>
    </section>

    <section class="features">
        <h2 class="section-title">專業領域</h2>
        <div class="features-grid">
            <div class="feature-card">
                <h3>時尚造型</h3>
                <p>彩妝、髮型、服裝搭配，培養完整時尚造型能力</p>
            </div>
            <div class="feature-card">
                <h3>舞台表演</h3>
                <p>舞蹈、戲劇、音樂表演，培養舞台魅力與演出技巧</p>
            </div>
            <div class="feature-card">
                <h3>影像製作</h3>
                <p>攝影、剪輯、後製，掌握視覺傳達與影像敘事</p>
            </div>
        </div>
    </section>

    <section class="gallery">
        <h2 class="section-title">學生作品</h2>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=600" alt="1"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1558769132-cb1aea1f1f57?w=600" alt="2"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600" alt="3"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=600" alt="4"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600" alt="5"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=600" alt="6"></div>
        </div>
    </section>

    <section class="cta">
        <div class="cta-content">
            <h2 class="section-title">探索更多</h2>
            <div class="cta-buttons">
                <a href="https://www.instagram.com/vnu001_official" target="_blank" class="btn">Instagram</a>
                <a href="https://youtube.com/@henryproduction" target="_blank" class="btn">YouTube</a>
            </div>
        </div>
    </section>
</body>
</html>
