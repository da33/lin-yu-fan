<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNU 時尚表演藝術系</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: #fff;
            color: #000;
            overflow-x: hidden;
        }
        
        /* 導航 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .social-icons {
            display: flex;
            gap: 30px;
        }
        
        .social-icons a {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #000;
            color: #000;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .social-icons a:hover {
            background: #000;
            color: #fff;
        }
        
        /* Hero 區塊 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f5f5 0%, #fff 100%);
            position: relative;
        }
        
        .hero-content {
            text-align: center;
            max-width: 900px;
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 30px;
            letter-spacing: -3px;
        }
        
        .hero .subtitle {
            font-size: 14px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #666;
        }
        
        /* 特色區塊 */
        .features {
            padding: 150px 80px;
            background: #000;
            color: #fff;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            margin-top: 80px;
        }
        
        .feature-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .feature-item p {
            font-size: 15px;
            line-height: 1.8;
            color: #999;
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            font-weight: 700;
            text-align: center;
        }
        
        /* Gallery */
        .gallery {
            padding: 150px 0;
            background: #fff;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            background: #f5f5f5;
            overflow: hidden;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }
        
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        
        /* CTA */
        .cta {
            padding: 150px 80px;
            background: #000;
            color: #fff;
            text-align: center;
        }
        
        .cta-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 60px;
        }
        
        .btn {
            padding: 20px 60px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            border: 1px solid #fff;
            color: #fff;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #fff;
            color: #000;
        }
        
        @media (max-width: 768px) {
            nav { padding: 20px 30px; }
            .hero h1 { font-size: 60px; }
            .features-grid { grid-template-columns: 1fr; }
            .gallery-grid { grid-template-columns: 1fr; }
            .cta-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VNU Fashion & Arts</div>
        <div class="social-icons">
            <a href="https://www.instagram.com/vnu001_official" target="_blank">IG</a>
            <a href="https://youtube.com/@henryproduction" target="_blank">YT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>時尚<br>表演<br>藝術</h1>
            <p class="subtitle">Fashion & Performing Arts</p>
        </div>
    </section>

    <section class="features">
        <h2 class="section-title">我們的專業</h2>
        <div class="features-grid">
            <div class="feature-item">
                <h3>時尚造型</h3>
                <p>專業彩妝、髮型設計、服裝搭配，打造完整時尚造型能力</p>
            </div>
            <div class="feature-item">
                <h3>舞台表演</h3>
                <p>舞蹈、戲劇、音樂表演訓練，培養舞台魅力與專業演出技巧</p>
            </div>
            <div class="feature-item">
                <h3>影像製作</h3>
                <p>攝影、剪輯、後製技術，掌握視覺傳達與影像敘事能力</p>
            </div>
        </div>
    </section>

    <section class="gallery">
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=800" alt="Fashion 1"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1558769132-cb1aea1f1f57?w=800" alt="Fashion 2"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800" alt="Fashion 3"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800" alt="Fashion 4"></div>
        </div>
    </section>

    <section class="cta">
        <h2 class="section-title">探索更多</h2>
        <div class="cta-buttons">
            <a href="https://www.instagram.com/vnu001_official" target="_blank" class="btn">Instagram</a>
            <a href="https://youtube.com/@henryproduction" target="_blank" class="btn">YouTube</a>
        </div>
    </section>
</body>
</html>
