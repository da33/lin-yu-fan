<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNU 時尚造型設計暨表演藝術系</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 固定側邊資訊 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            padding: 60px 40px;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .sidebar h1 {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        
        .sidebar p {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }
        
        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .sidebar-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        
        .sidebar-links a:hover {
            opacity: 0.6;
        }
        
        /* 全屏滾動作品 */
        .gallery-fullscreen {
            margin-left: 300px;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        
        .slide {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
        }
        
        .slide-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .slide-content h2 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .slide-content p {
            font-size: 16px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .gallery-fullscreen { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <h1>VNU<br>時尚造型<br>表演藝術</h1>
            <p>Fashion & Arts</p>
        </div>
        <div class="sidebar-links">
            <a href="https://www.instagram.com/vnu001_official" target="_blank">Instagram →</a>
            <a href="https://youtube.com/@henryproduction" target="_blank">YouTube →</a>
        </div>
    </div>

    <div class="gallery-fullscreen">
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=1920" alt="時尚造型">
            <div class="slide-content">
                <h2>時尚造型</h2>
                <p>彩妝 · 髮型 · 服裝搭配</p>
            </div>
        </div>
        
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1558769132-cb1aea1f1f57?w=1920" alt="舞台表演">
            <div class="slide-content">
                <h2>舞台表演</h2>
                <p>舞蹈 · 戲劇 · 音樂</p>
            </div>
        </div>
        
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=1920" alt="影像製作">
            <div class="slide-content">
                <h2>影像製作</h2>
                <p>攝影 · 剪輯 · 後製</p>
            </div>
        </div>
        
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1920" alt="學生作品">
            <div class="slide-content">
                <h2>學生作品</h2>
                <p>創意無限 · 專業培訓</p>
            </div>
        </div>
    </div>
</body>
</html>
