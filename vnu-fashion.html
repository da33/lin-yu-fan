<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNU 時尚造型設計暨表演藝術系</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 導航 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
        }
        
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 3px;
        }
        
        .social-links {
            display: flex;
            gap: 20px;
        }
        
        .social-links a {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
        }
        
        .social-links a:hover {
            background: #ff0050;
            color: #fff;
            transform: scale(1.1);
        }
        
        /* Hero 超大視覺 */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 50%, #000 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.02) 10px,
                rgba(255,255,255,0.02) 20px
            );
            animation: slide 20s linear infinite;
        }
        
        @keyframes slide {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .hero-content {
            text-align: center;
            z-index: 1;
        }
        
        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 150px;
            line-height: 0.9;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #fff 0%, #ff0050 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255,0,80,0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(255,0,80,0.8)); }
        }
        
        .hero .tagline {
            font-size: 24px;
            margin-top: 30px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #999;
        }
        
        /* 特色區塊 - 分割設計 */
        .split-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }
        
        .split-left {
            background: #ff0050;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
        }
        
        .split-right {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
        }
        
        .split-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 80px;
            margin-bottom: 40px;
            line-height: 1;
        }
        
        .split-content p {
            font-size: 18px;
            line-height: 1.8;
            color: rgba(255,255,255,0.8);
        }
        
        .split-left .split-content h2 { color: #000; }
        .split-left .split-content p { color: rgba(0,0,0,0.7); }
        
        /* Gallery 全屏網格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: all 0.5s;
        }
        
        .gallery-item:hover img {
            filter: grayscale(0%);
            transform: scale(1.2);
        }
        
        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,0,80,0.3);
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .gallery-item:hover::after {
            opacity: 1;
        }
        
        /* CTA 區塊 */
        .cta {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            text-align: center;
            padding: 80px 40px;
        }
        
        .cta h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 100px;
            margin-bottom: 60px;
        }
        
        .cta-buttons {
            display: flex;
            gap: 30px;
        }
        
        .btn {
            padding: 25px 60px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            background: #fff;
            color: #000;
            transition: all 0.3s;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
        }
        
        .btn:hover {
            background: #ff0050;
            color: #fff;
            transform: translateY(-5px);
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 60px; }
            .split-section { grid-template-columns: 1fr; }
            .gallery { grid-template-columns: repeat(2, 1fr); }
            .cta-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VNU FASHION</div>
        <div class="social-links">
            <a href="https://www.instagram.com/vnu001_official" target="_blank">IG</a>
            <a href="https://youtube.com/@henryproduction" target="_blank">YT</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>FASHION<br>ARTS</h1>
            <p class="tagline">時尚造型 × 表演藝術</p>
        </div>
    </section>

    <div class="split-section">
        <div class="split-left">
            <div class="split-content">
                <h2>創意<br>無限</h2>
                <p>從時尚造型到舞台表演，我們培養新世代創意人才。專業師資、完善設備、產學合作，打造你的時尚夢想。</p>
            </div>
        </div>
        <div class="split-right">
            <div class="split-content">
                <h2>專業<br>培訓</h2>
                <p>彩妝、髮型、服裝、舞蹈、戲劇、影像製作。六大專業領域，全方位培養你的技能與美感。</p>
            </div>
        </div>
    </div>

    <section class="gallery">
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=800" alt="1"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1558769132-cb1aea1f1f57?w=800" alt="2"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800" alt="3"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800" alt="4"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=800" alt="5"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=800" alt="6"></div>
    </section>

    <section class="cta">
        <h2>JOIN US</h2>
        <div class="cta-buttons">
            <a href="https://www.instagram.com/vnu001_official" target="_blank" class="btn">Instagram</a>
            <a href="https://youtube.com/@henryproduction" target="_blank" class="btn">YouTube</a>
        </div>
    </section>
</body>
</html>
