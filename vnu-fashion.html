<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNU 時尚表演藝術系</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Helvetica Neue', -apple-system, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .social-links {
            display: flex;
            gap: 30px;
        }
        
        .social-links a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        
        .social-links a:hover {
            color: #ff0050;
        }
        
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            position: relative;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="1" height="1" fill="white" opacity="0.05"/></svg>');
            background-size: 50px 50px;
        }
        
        .hero-content {
            text-align: center;
            z-index: 1;
        }
        
        .hero h1 {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #ff0050 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1s ease;
        }
        
        .hero p {
            font-size: 18px;
            letter-spacing: 4px;
            color: #999;
            text-transform: uppercase;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .about {
            padding: 100px 60px;
            background: #0a0a0a;
            text-align: center;
        }
        
        .section-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 60px;
            letter-spacing: -1px;
        }
        
        .about-text {
            max-width: 800px;
            margin: 0 auto;
            font-size: 18px;
            line-height: 2;
            color: #999;
        }
        
        .cta {
            padding: 100px 60px;
            background: #000;
            text-align: center;
        }
        
        .cta-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 60px;
        }
        
        .btn {
            padding: 20px 50px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-decoration: none;
            border: 2px solid #fff;
            color: #fff;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #fff;
            color: #000;
        }
        
        .btn-primary {
            background: #ff0050;
            border-color: #ff0050;
        }
        
        .btn-primary:hover {
            background: #fff;
            color: #ff0050;
            border-color: #fff;
        }
        
        @media (max-width: 768px) {
            nav { padding: 20px 30px; }
            .hero h1 { font-size: 48px; }
            .section-title { font-size: 32px; }
            .cta-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VNU 時尚表演藝術</div>
        <div class="social-links">
            <a href="https://www.instagram.com/vnu001_official" target="_blank">INSTAGRAM</a>
            <a href="https://youtube.com/@henryproduction" target="_blank">YOUTUBE</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>時尚表演藝術系</h1>
            <p>Fashion & Performing Arts</p>
        </div>
    </section>

    <section class="about">
        <h2 class="section-title">關於我們</h2>
        <div class="about-text">
            萬能科技大學時尚表演藝術系，培育新世代時尚與表演藝術人才。<br>
            結合理論與實務，打造專業舞台表演、時尚造型、影像製作能力。<br><br>
            我們相信，創意與技術並重，才能在時尚產業中脫穎而出。
        </div>
    </section>

    <section class="cta">
        <h2 class="section-title">探索更多</h2>
        <div class="cta-buttons">
            <a href="https://www.instagram.com/vnu001_official" target="_blank" class="btn btn-primary">Instagram</a>
            <a href="https://youtube.com/@henryproduction" target="_blank" class="btn">YouTube</a>
        </div>
    </section>
</body>
</html>
